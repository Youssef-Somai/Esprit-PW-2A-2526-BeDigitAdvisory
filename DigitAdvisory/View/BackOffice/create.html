<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Formulaire d'ajout d'un quiz">
    <meta name="author" content="Étudiant">
    <title>Ajouter un Quiz</title>
    <link rel="stylesheet" href="/DigitAdvisory/View/BackOffice/css/create.css">
</head>
<body>

    <header>
        <h1>Gestion des Quiz</h1>
    </header>

    <main>
        <section>
            <h2>Ajouter un Quiz</h2>

            <div id="successBox" style="display: none;">
                Quiz ajouté avec succès.
            </div>

            <form id="quizForm"
                  action="/DigitAdvisory/Controller/QuizController.php?action=add"
                  method="POST"
                  enctype="multipart/form-data"
                  novalidate>

                <div class="form-group">
                    <label for="titre">Titre :</label>
                    <input type="text" name="titre" id="titre">
                </div>

                <div class="form-group">
                    <label for="description">Description :</label>
                    <textarea name="description" id="description" rows="5" cols="30"></textarea>
                </div>

                <div class="form-group">
                    <label for="image">Image :</label>
                    <input type="file" name="image" id="image">
                </div>

                <div class="form-group">
                    <label for="date_creation">Date de création :</label>
                    <input type="datetime-local" name="date_creation" id="date_creation">
                </div>

                <div class="form-group">
                    <button type="submit">Ajouter</button>
                    <button type="reset">Réinitialiser</button>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>
            <a href="/DigitAdvisory/Controller/QuizController.php?action=read">Voir les quiz</a>
        </p>
    </footer>

    <script src="/DigitAdvisory/View/BackOffice/js/create.js"></script>
</body>
</html>
