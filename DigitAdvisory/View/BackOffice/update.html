<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Modifier un quiz">
    <meta name="author" content="Étudiant">
    <title>Modifier Quiz</title>
    <link rel="stylesheet" href="/DigitAdvisory/View/BackOffice/css/create.css">
</head>
<body>

<header>
    <h1>Gestion des Quiz</h1>
</header>

<main>
    <section>
        <h2>Modifier le Quiz</h2>

        <div id="successBox" style="display:none;">
            Quiz modifié avec succès
        </div>

        <form id="quizForm"
              action="/DigitAdvisory/Controller/QuizController.php?action=update&id=<?= $quiz['id_quiz'] ?>"
              method="POST"
              enctype="multipart/form-data"
              novalidate>

            <div class="form-group">
                <label for="titre">Titre :</label>
                <input type="text" name="titre" id="titre" value="<?= $quiz['titre'] ?>">
            </div>

            <div class="form-group">
                <label for="description">Description :</label>
                <textarea name="description" id="description"><?= $quiz['description'] ?></textarea>
            </div>

            <div class="form-group">
                <label>Image actuelle :</label><br>
                <img src="/DigitAdvisory/public/uploads/<?= $quiz['image'] ?>" width="120">
            </div>

            <div class="form-group">
                <label for="image">Nouvelle image :</label>
                <input type="file" name="image" id="image">
                <small>Formats : JPG, PNG, WEBP (optionnel)</small>
            </div>

            <div class="form-group">
                <label for="date_creation">Date :</label>
                <input type="datetime-local" name="date_creation" id="date_creation"
                       value="<?= str_replace(' ', 'T', substr($quiz['date_creation'], 0, 16)) ?>">
            </div>

            <div class="form-group">
                <button type="submit">Modifier</button>
                <button type="reset">Annuler</button>
            </div>

        </form>
    </section>
</main>

<footer>
    <p>
        <a href="/DigitAdvisory/Controller/QuizController.php?action=read">⬅ Retour</a>
    </p>
</footer>

<script src="/DigitAdvisory/View/BackOffice/js/update.js"></script>

</body>
</html>
