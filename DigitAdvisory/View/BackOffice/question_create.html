<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Formulaire d'ajout d'une question">
    <meta name="author" content="Étudiant">
    <title>Ajouter une Question</title>
    <link rel="stylesheet" href="/DigitAdvisory/View/BackOffice/css/create.css">
</head>
<body>

<header>
    <h1>Gestion des Questions</h1>
</header>

<main>
    <section>
        <h2>Ajouter une Question</h2>

        <form id="questionForm" method="POST" novalidate>
            <input type="hidden" name="id_quiz" id="id_quiz">

            <div class="form-group">
                <label for="question">Question :</label>
                <textarea name="question" id="question" rows="4" cols="40"></textarea>
            </div>

            <div class="form-group">
                <label for="choix1">Choix 1 :</label>
                <input type="text" name="choix1" id="choix1">
            </div>

            <div class="form-group">
                <label for="choix2">Choix 2 :</label>
                <input type="text" name="choix2" id="choix2">
            </div>

            <div class="form-group">
                <label for="choix3">Choix 3 :</label>
                <input type="text" name="choix3" id="choix3">
            </div>

            <div class="form-group">
                <label for="bonne_reponse">Bonne réponse :</label>
                <input type="text" name="bonne_reponse" id="bonne_reponse">
            </div>

            <div class="form-group">
                <label for="point">Point :</label>
                <input type="number" name="point" id="point">
            </div>

            <div class="form-group">
                <button type="submit">Ajouter</button>
                <button type="reset">Réinitialiser</button>
            </div>
        </form>

        <p>
            <a href="/DigitAdvisory/Controller/QuizController.php?action=read">Retour aux quiz</a>
        </p>
    </section>
</main>

<script src="/DigitAdvisory/View/BackOffice/js/question.js"></script>
</body>
</html>
